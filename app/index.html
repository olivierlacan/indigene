<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1f6b3b" />
    <meta
      name="description"
      content="Stand in a spot, and find native plants that will actually thrive there — ranked by what they do for the local ecosystem."
    />
    <title>Indigene — native plants for exactly where you stand</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to main content</a>
    <header class="app-header">
      <h1 class="app-title">
        <a href="#/"><span aria-hidden="true">🌱</span> Indigene</a>
      </h1>
      <button
        id="offline-badge"
        class="offline-badge"
        type="button"
        hidden
        aria-live="polite"
      >
        Offline — using saved data
      </button>
      <nav class="site-nav" aria-label="Sections">
        <a href="#/plants" data-section="explore">Explore</a>
        <a href="#/search" data-section="search">Search</a>
        <a href="#/wildlife" data-section="wildlife">Wildlife</a>
        <div id="saved-menu" class="nav-menu">
          <button
            type="button"
            class="nav-menu-btn"
            data-section="saved"
            aria-haspopup="menu"
            aria-expanded="false"
            aria-controls="saved-menu-panel"
            aria-label="Saved locations"
          >
            <span aria-hidden="true">🔖</span>
            <span class="nav-menu-label">Saved</span>
          </button>
          <div
            id="saved-menu-panel"
            class="nav-menu-panel"
            role="menu"
            aria-label="Saved locations"
            hidden
          ></div>
        </div>
      </nav>
    </header>

    <!-- Progress rail: which step of the flow you are on. -->
    <nav class="steps" aria-label="Progress">
      <ol id="steps" class="steps-list"></ol>
    </nav>

    <main id="main" class="app-main" tabindex="-1"></main>

    <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
